<!DOCTYPE html>
{% with render_language|default:"en" as page_language %}
{% load i18n %}
<html lang="{{ page_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      background: #c8c8c8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    @media print {
      html, body {
        background: white;
        display: block;
        width: 100%;
        height: 100%;
      }
    }
  </style>
</head>
<body>
{% include child_templates.credential %}
</body>
</html>
{% endwith %}
